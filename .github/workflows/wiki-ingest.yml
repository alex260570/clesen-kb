name: Wiki Ingest

on:
  push:
    paths:
      - 'raw/**'

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run wiki ingest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          NEW_FILES=$(comm -23 <(ls raw/ | sort) <(grep -oP '(?<=raw/)\S+' index.md | sort))
          if [ -z "$NEW_FILES" ]; then
            echo "No new files to ingest."
            exit 0
          fi
          echo "New files: $NEW_FILES"
          for FILE in $NEW_FILES; do
            echo "Ingesting $FILE..."
            for attempt in 1 2 3 4 5; do
              claude -p "Read CLAUDE.md and index.md for context. Then ingest raw/$FILE: write focused wiki pages in the appropriate wiki/ subfolder, update existing related pages with cross-links, update index.md with a row for the new page, and append to log.md. Do not commit anything." --model claude-haiku-4-5-20251001 --dangerously-skip-permissions && break
              echo "Attempt $attempt failed, retrying in 60s..."
              sleep 60
            done
          done

      - name: Commit wiki changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wiki/ index.md log.md
          git diff --staged --quiet || git commit -m "docs: auto-ingest wiki pages from raw/"
          git push
