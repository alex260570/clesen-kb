name: Wiki Ingest

on:
  push:
    paths:
      - 'raw/**'

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Install dependencies
        run: pip install anthropic

      - name: Run wiki ingest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'raw/' | sed 's|raw/||')
          if [ -z "$NEW_FILES" ]; then
            echo "No new files to ingest."
            exit 0
          fi
          echo "New files: $NEW_FILES"
          for FILE in $NEW_FILES; do
            echo "Ingesting $FILE..."
            for attempt in 1 2 3 4 5; do
              python .github/scripts/ingest.py "$FILE" && break
              echo "Attempt $attempt failed, retrying in 60s..."
              sleep 60
            done
          done

      - name: Commit wiki changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wiki/ index.md log.md
          git diff --staged --quiet || git commit -m "docs: auto-ingest wiki pages from raw/"
          git push
