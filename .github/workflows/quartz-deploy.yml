name: Deploy Quartz to Netlify

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - 'index.md'
      - 'quartz/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Clone Quartz v4
        run: git clone --depth 1 https://github.com/jackyzha0/quartz.git /tmp/quartz

      - name: Install Quartz dependencies
        working-directory: /tmp/quartz
        run: npm ci

      - name: Apply Clesen KB config
        run: cp quartz/quartz.config.ts /tmp/quartz/quartz.config.ts

      - name: Populate content directory
        run: |
          rm -rf /tmp/quartz/content
          mkdir -p /tmp/quartz/content/wiki
          cp -r wiki/* /tmp/quartz/content/wiki/
          cp index.md /tmp/quartz/content/index.md

      - name: Build Quartz
        working-directory: /tmp/quartz
        run: npx quartz build

      - name: Deploy to Netlify
        working-directory: /tmp/quartz
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir public
